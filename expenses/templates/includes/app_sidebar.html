{% load static %}
<aside class="sidebar" id="sidebar" aria-label="Main navigation">
  <div class="sidebar__header">
    <button type="button" class="sidebar__close" id="sidebarClose" aria-label="Close menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
    <span class="sidebar__brand">Spend Wise</span>
  </div>
  <nav class="sidebar__nav">
    <a class="sidebar__link{% if active_page == 'dashboard' %} is-active{% endif %}" href="{% url 'dashboard' %}">
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </span>
      <span class="sidebar__label">Home</span>
    </a>
    <a class="sidebar__link{% if active_page == 'monthly' %} is-active{% endif %}" href="{% url 'monthly' %}">
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </span>
      <span class="sidebar__label">Monthly Analysis</span>
    </a>
    <a class="sidebar__link{% if active_page == 'weekly' %} is-active{% endif %}" href="{% url 'weekly' %}">
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none" />
        </svg>
      </span>
      <span class="sidebar__label">Weekly Analysis</span>
    </a>
    <a class="sidebar__link" href="{% url 'login' %}">
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span class="sidebar__label">Logout</span>
    </a>
  </nav>
</aside>
